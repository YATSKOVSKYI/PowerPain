<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — PowerPain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23C43E1C'/%3E%3Ctext x='16' y='24' text-anchor='middle' font-family='Arial' font-size='22' font-weight='bold' fill='white'%3EP%3C/text%3E%3C/svg%3E">
  <meta name="theme-color" content="#080808">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080808;
      --surface: #141414;
      --primary: #C43E1C;
      --primary-hover: #D4522F;
      --primary-glow: rgba(196, 62, 28, 0.25);
      --text: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --text-muted: rgba(255, 255, 255, 0.32);
      --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    html { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Film grain */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 10000;
    }

    /* Background radial glow */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow::before {
      content: "";
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(196, 62, 28, 0.12) 0%, transparent 70%);
      animation: pulse-glow 6s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--primary);
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
    }

    /* Glitch 404 */
    .glitch-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 24px;
    }

    .glitch-404 {
      font-size: clamp(120px, 20vw, 220px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--text);
      position: relative;
      display: inline-block;
      text-shadow: 0 0 40px var(--primary-glow);
    }

    .glitch-404::before,
    .glitch-404::after {
      content: "404";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .glitch-404::before {
      color: #FF6B4A;
      z-index: -1;
      animation: glitch-top 3s ease-in-out infinite;
      clip-path: inset(0 0 50% 0);
    }

    .glitch-404::after {
      color: var(--primary);
      z-index: -1;
      animation: glitch-bottom 3s ease-in-out infinite;
      clip-path: inset(50% 0 0 0);
    }

    @keyframes glitch-top {
      0%, 80%, 100% { transform: none; opacity: 0; }
      82% { transform: translate(-4px, -2px) skewX(-2deg); opacity: 1; }
      84% { transform: translate(4px, 1px) skewX(1deg); opacity: 1; }
      86% { transform: translate(-2px, 2px); opacity: 1; }
      88% { transform: translate(3px, -1px) skewX(-1deg); opacity: 0.8; }
      90% { transform: none; opacity: 0; }
    }

    @keyframes glitch-bottom {
      0%, 80%, 100% { transform: none; opacity: 0; }
      83% { transform: translate(3px, 2px) skewX(2deg); opacity: 1; }
      85% { transform: translate(-4px, -1px) skewX(-1deg); opacity: 1; }
      87% { transform: translate(2px, -2px); opacity: 1; }
      89% { transform: translate(-3px, 1px) skewX(1deg); opacity: 0.8; }
      91% { transform: none; opacity: 0; }
    }

    /* Scanline across the 404 */
    .glitch-wrap::after {
      content: "";
      position: absolute;
      left: -10%;
      width: 120%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary), #FF6B4A, var(--primary), transparent);
      opacity: 0;
      animation: scanline 3s ease-in-out infinite;
      z-index: 2;
      filter: blur(1px);
      box-shadow: 0 0 12px var(--primary-glow);
    }

    @keyframes scanline {
      0%, 78%, 100% { top: 0; opacity: 0; }
      80% { top: 10%; opacity: 0.8; }
      92% { top: 90%; opacity: 0.8; }
      94% { opacity: 0; }
    }

    /* Horizontal glitch bars */
    .glitch-bar {
      position: absolute;
      height: 2px;
      background: var(--primary);
      opacity: 0;
      z-index: 3;
    }
    .glitch-bar:nth-child(1) {
      top: 20%; left: -5%; width: 40%;
      animation: bar-flash 3s 0.1s ease-in-out infinite;
    }
    .glitch-bar:nth-child(2) {
      top: 45%; right: -5%; width: 35%;
      animation: bar-flash 3s 0.2s ease-in-out infinite;
    }
    .glitch-bar:nth-child(3) {
      top: 70%; left: 10%; width: 50%;
      animation: bar-flash 3s 0.05s ease-in-out infinite;
    }

    @keyframes bar-flash {
      0%, 82%, 92%, 100% { opacity: 0; }
      84%, 90% { opacity: 0.5; }
      86% { opacity: 0.8; transform: translateX(4px); }
      88% { opacity: 0.6; transform: translateX(-3px); }
    }

    /* Subtitle */
    .subtitle {
      font-size: clamp(16px, 3vw, 22px);
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .description {
      font-size: clamp(13px, 2vw, 15px);
      color: var(--text-muted);
      max-width: 380px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }

    /* CTA button */
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: var(--primary);
      color: white;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 0 0 var(--primary-glow), 0 4px 20px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-home::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .btn-home:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 0 30px var(--primary-glow), 0 8px 30px rgba(0, 0, 0, 0.4);
    }

    .btn-home:hover::before { opacity: 1; }

    .btn-home:active {
      transform: translateY(0);
    }

    .btn-home svg {
      width: 18px;
      height: 18px;
      transition: transform 0.25s;
    }

    .btn-home:hover svg {
      transform: translateX(-3px);
    }

    /* Logo mark */
    .logo-mark {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-decoration: none;
      transition: color 0.2s;
    }

    .logo-mark:hover { color: var(--text-secondary); }

    .logo-mark svg {
      width: 24px;
      height: 24px;
    }

    /* Orbiting ring decoration */
    .orbit-ring {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(85vw, 500px);
      height: min(85vw, 500px);
      border-radius: 50%;
      border: 1px solid rgba(196, 62, 28, 0.06);
      pointer-events: none;
      z-index: 0;
      animation: orbit-spin 60s linear infinite;
    }

    .orbit-ring::before {
      content: "";
      position: absolute;
      top: -3px;
      left: 50%;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary-glow);
      opacity: 0.6;
    }

    .orbit-ring-2 {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(110vw, 650px);
      height: min(110vw, 650px);
      border-radius: 50%;
      border: 1px dashed rgba(196, 62, 28, 0.04);
      pointer-events: none;
      z-index: 0;
      animation: orbit-spin 90s linear infinite reverse;
    }

    @keyframes orbit-spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .glitch-404 { font-size: 100px; }
      .btn-home { padding: 12px 24px; font-size: 14px; }
      .orbit-ring { width: 300px; height: 300px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="orbit-ring"></div>
  <div class="orbit-ring-2"></div>
  <div class="particles" id="particles"></div>

  <div class="content">
    <div class="glitch-wrap">
      <div class="glitch-bar"></div>
      <div class="glitch-bar"></div>
      <div class="glitch-bar"></div>
      <div class="glitch-404">404</div>
    </div>
    <p class="subtitle">Page not found</p>
    <p class="description">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="btn-home">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M13 8H3M7 4L3 8l4 4"/></svg>
      Back to PowerPain
    </a>
  </div>

  <a href="/" class="logo-mark">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#D35230"/>
          <stop offset="100%" stop-color="#A92B1A"/>
        </linearGradient>
      </defs>
      <rect width="32" height="32" rx="8" fill="url(#g)"/>
      <text x="16" y="24" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="21" font-weight="800" fill="white" opacity="0.95">P</text>
    </svg>
    PowerPain
  </a>

  <script src="/404-particles.js"></script>
</body>
</html>
